# Run memharness with background workers
# Usage: docker compose -f docker-compose.yml -f docker-compose.workers.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: memharness-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: memharness
      POSTGRES_USER: memharness
      POSTGRES_PASSWORD: memharness
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memharness"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: memharness-worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://memharness:memharness@postgres/memharness
      WORKER_INTERVAL: "300"
    restart: unless-stopped

volumes:
  pgdata:
