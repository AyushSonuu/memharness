# Docker Compose for memharness development services
# Usage: docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: memharness-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: memharness
      POSTGRES_USER: memharness
      POSTGRES_PASSWORD: memharness
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memharness"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
